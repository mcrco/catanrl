# Phase 1 D-S: small xdim (1024×2, lighter CNN).
name: xdim-flat-2p-d-s

model:
  model_type: flat
  backbone_type: xdim
  policy_hidden_dims: [1024, 1024]
  critic_hidden_dims: [1024, 1024]
  policy_mode: public
  critic_mode: full
  network_mode: separate
  xdim_cnn_channels: [32, 64, 64]
  xdim_cnn_kernel_size: [3, 5]
  xdim_policy_fusion_hidden_dim: 1024
  xdim_critic_fusion_hidden_dim: 1024

game:
  map_type: BASE
  vps_to_win: 15
  discard_limit: 9
  num_players: 2
